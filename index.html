<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Big Rocks — Weekly Planner</title>
  <meta name="description" content="A weekly planner built on Stephen Covey's Habit 3 — put first things first by choosing the big rocks for each of your roles." />
  <meta name="theme-color" content="#0E0C09" />

  <!-- Custom logo (shows in the browser tab) -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="apple-touch-icon" href="favicon.svg" />

  <!-- React + Babel, loaded from the web (no install needed) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    html, body { height: 100%; margin: 0; padding: 0; }
    body { background: #0E0C09; }
    #root { min-height: 100%; }
    /* simple loading text before React starts */
    #root:empty::before {
      content: "Loading\2026";
      display: flex; align-items: center; justify-content: center;
      height: 100vh; color: #4A4438;
      font-family: Georgia, serif; font-size: 1rem;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- The whole app. type="text/babel" lets the browser understand JSX. -->
  <script type="text/babel">
const { useState, useEffect } = React;

const FONTS = `@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;1,9..144,400&family=DM+Sans:wght@300;400;500;600&display=swap');`;

const PALETTE = [
  { mid:'#52A858', dmBg:'#0C1A0D', dmText:'#86CC8A' },
  { mid:'#D4682A', dmBg:'#1F0D00', dmText:'#EE9868' },
  { mid:'#4A7CC4', dmBg:'#08101F', dmText:'#84B4EC' },
  { mid:'#C04060', dmBg:'#1A0508', dmText:'#EC88A0' },
  { mid:'#7055B8', dmBg:'#0E0818', dmText:'#B498E8' },
  { mid:'#2B9898', dmBg:'#041414', dmText:'#68CCCC' },
  { mid:'#7A8898', dmBg:'#0F1218', dmText:'#A0B0C0' },
  { mid:'#8A8078', dmBg:'#111008', dmText:'#B0A898' },
];

const EMOJIS    = ['💼','🏡','💪','📚','🌱','🎯','🤝','💡','🎨','🏋️','🧠','❤️','🌍','⭐','🔬','🏆','🎵','✈️','🍳','🧘'];
const DAYS_3    = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];   // desktop
const DAYS_2    = ['Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa', 'Su'];  // mobile strip
const DURATIONS = [
  {label:'30 min',value:30},{label:'1 hour',value:60},
  {label:'1.5 hrs',value:90},{label:'2 hours',value:120},
  {label:'3 hours',value:180},{label:'4 hours',value:240},
];
const DEFAULT_ROLES = [
  {id:'r1',name:'Professional',emoji:'💼',pi:0},
  {id:'r2',name:'Family',      emoji:'🏡',pi:1},
  {id:'r3',name:'Health',      emoji:'💪',pi:2},
  {id:'r4',name:'Self',        emoji:'📚',pi:3},
];

function genId(){ return Math.random().toString(36).slice(2,11); }
function getMondayOf(o=0){
  const now=new Date(), dow=now.getDay()||7, mon=new Date(now);
  mon.setDate(now.getDate()-(dow-1)+o*7); mon.setHours(0,0,0,0); return mon;
}
function getWeekDates(o=0){
  const mon=getMondayOf(o);
  return Array.from({length:7},(_,i)=>{ const d=new Date(mon); d.setDate(mon.getDate()+i); return d; });
}
function toWeekKey(mon){ return mon.toISOString().slice(0,10); }
function isToday(d){ return d.toDateString()===new Date().toDateString(); }
function weekLabel(o){
  const dates=getWeekDates(o);
  const fmt=d=>d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  const range=`${fmt(dates[0])} – ${fmt(dates[6])}`;
  if(o===0)  return {label:'This Week',range};
  if(o===1)  return {label:'Next Week',range};
  if(o===-1) return {label:'Last Week',range};
  return {label:range,range:String(dates[0].getFullYear())};
}
function formatTime(t){
  if(!t) return null;
  const [h,m]=t.split(':').map(Number);
  return `${h%12||12}:${String(m).padStart(2,'0')}${h>=12?'pm':'am'}`;
}
function addMins(t,mins){
  const [h,m]=t.split(':').map(Number), tot=h*60+m+mins;
  return `${String(Math.floor(tot/60)%24).padStart(2,'0')}:${String(tot%60).padStart(2,'0')}`;
}

// ── App ────────────────────────────────────────────────────────────────────
function App(){
  const [roles,setRoles]   = useState(DEFAULT_ROLES);
  const [rocks,setRocks]   = useState([]);
  const [weekOffset,setWO] = useState(0);
  const [loaded,setLoaded] = useState(false);
  const [modal,setModal]   = useState(null);
  const [mobileView,setMV] = useState('rocks');

  const weekDates  = getWeekDates(weekOffset);
  const weekKey    = toWeekKey(weekDates[0]);
  const weekRocks  = rocks.filter(r=>r.weekKey===weekKey);
  const forDay     = i=>weekRocks.filter(r=>r.dayIdx===i);
  const forRole    = id=>weekRocks.filter(r=>r.roleId===id);
  const unscheduled= weekRocks.filter(r=>r.dayIdx===null);
  const completion = weekRocks.length>0
    ? Math.round(weekRocks.filter(r=>r.completed).length/weekRocks.length*100) : 0;

  useEffect(()=>{
    try{
      const rv=localStorage.getItem('brp:roles');
      const rk=localStorage.getItem('brp:rocks');
      if(rv) setRoles(JSON.parse(rv));
      if(rk) setRocks(JSON.parse(rk));
    }catch{}
    setLoaded(true);
  },[]);
  useEffect(()=>{
    if(!loaded) return;
    try{ localStorage.setItem('brp:roles',JSON.stringify(roles)); }catch{}
    try{ localStorage.setItem('brp:rocks',JSON.stringify(rocks)); }catch{}
  },[roles,rocks,loaded]);

  const addRole = (name,emoji,pi)=>{ setRoles(p=>[...p,{id:genId(),name,emoji,pi}]); setModal(null); };
  const rmRole  = id=>{ setRoles(p=>p.filter(r=>r.id!==id)); setRocks(p=>p.filter(r=>r.roleId!==id)); setModal(null); };
  const addRock = (roleId,title,desc)=>{
    setRocks(p=>[...p,{id:genId(),roleId,title,description:desc||'',weekKey,dayIdx:null,completed:false,startTime:null,duration:60}]);
    setModal(null);
  };
  const updRock = (id,ch)=>setRocks(p=>p.map(r=>r.id===id?{...r,...ch}:r));
  const rmRock  = id=>{ setRocks(p=>p.filter(r=>r.id!==id)); setModal(null); };

  const copyFwd = ()=>{
    const nk=toWeekKey(getWeekDates(weekOffset+1)[0]);
    if(rocks.some(r=>r.weekKey===nk)&&!confirm('Next week already has rocks. Copy anyway?')) return;
    setRocks(p=>[...p,...weekRocks.map(r=>({...r,id:genId(),weekKey:nk,dayIdx:null,completed:false,startTime:null}))]);
    setWO(o=>o+1);
  };

  const toGcal = rock=>{
    const role=roles.find(r=>r.id===rock.roleId);
    if(rock.dayIdx===null) return alert('Schedule this rock to a day first.');
    const d=weekDates[rock.dayIdx];
    const ds=d.toISOString().slice(0,10).replace(/-/g,'');
    const title=encodeURIComponent(`🪨 ${rock.title} [${role?.name}]`);
    const notes=encodeURIComponent(rock.description||'Big Rock — 7 Habits Weekly Planner');
    let dates;
    if(rock.startTime){
      const end=addMins(rock.startTime,rock.duration||60);
      const [sh,sm]=rock.startTime.split(':'), [eh,em]=end.split(':');
      dates=`${ds}T${sh}${sm}00/${ds}T${eh}${em}00`;
    } else { dates=`${ds}/${ds}`; }
    window.open(`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${dates}&details=${notes}`,'_blank');
  };

  const {label:wLabel,range:wRange}=weekLabel(weekOffset);

  if(!loaded) return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',
      background:'#0E0C09',fontFamily:"'Fraunces',serif",color:'#4A4438',fontSize:'1rem'}}>
      Loading…
    </div>
  );

  return(
    <>
      <style>{FONTS+CSS}</style>
      <div className="planner">

        {/* ── HEADER ── */}
        <header className="header">
          <div className="brand">
            <span className="logo">Big Rocks</span>
            <span className="logo-sub">Weekly Planner</span>
          </div>
          <div className="week-nav">
            <button className="nav-btn" onClick={()=>setWO(o=>o-1)}>‹</button>
            <div className="week-info">
              <span className="wk-label">{wLabel}</span>
              <span className="wk-range">{wRange}</span>
            </div>
            <button className="nav-btn" onClick={()=>setWO(o=>o+1)}>›</button>
            {weekOffset!==0&&<button className="today-pill" onClick={()=>setWO(0)}>Today</button>}
          </div>
          <div className="hdr-right">
            {weekRocks.length>0&&(
              <div className="prog-wrap" title={`${completion}%`}>
                <svg viewBox="0 0 36 36" width="40" height="40">
                  <circle cx="18" cy="18" r="14" fill="none" stroke="rgba(255,255,255,0.07)" strokeWidth="3"/>
                  <circle cx="18" cy="18" r="14" fill="none" stroke="#C4933A" strokeWidth="3"
                    strokeDasharray={`${completion*0.88} 88`} strokeLinecap="round" transform="rotate(-90 18 18)"/>
                </svg>
                <span className="pct">{completion}%</span>
              </div>
            )}
          </div>
        </header>

        {/* ── MOBILE TABS ── */}
        <div className="mob-tabs">
          <button className={`mtab ${mobileView==='rocks'?'active':''}`} onClick={()=>setMV('rocks')}>My Rocks</button>
          <button className={`mtab ${mobileView==='week'?'active':''}`}  onClick={()=>setMV('week')}>Week View</button>
        </div>

        <div className="body-wrap">

          {/* ── SIDEBAR ── */}
          <aside className={`sidebar ${mobileView==='rocks'?'mob-show':''}`}>
            <div className="sb-top">
              <span className="sb-heading">Roles &amp; Big Rocks</span>
              <button className="add-role-btn" onClick={()=>setModal({type:'addRole'})}>+ Role</button>
            </div>
            <div className="covey-hint">
              <span className="hq">"Put first things first."</span>
              <span className="hb"> Add 2–3 big rocks per role — the outcomes only you can create this week.</span>
            </div>

            {roles.map(role=>{
              const pal=PALETTE[role.pi]||PALETTE[0];
              const rr=forRole(role.id);
              const done=rr.filter(r=>r.completed).length;
              return(
                <div key={role.id} className="role-card"
                  style={{'--rm':pal.mid,'--rdm':pal.dmBg,'--rdt':pal.dmText}}>
                  <div className="rc-top">
                    <div className="rc-title-row">
                      <span>{role.emoji}</span>
                      <span className="rn">{role.name}</span>
                      {rr.length>0&&<span className="rbadge">{done}/{rr.length}</span>}
                    </div>
                    <div className="rc-btns">
                      <button className="r-add" onClick={()=>{
                        if(rr.length>=3) return alert('Max 3 big rocks per role.');
                        setModal({type:'addRock',roleId:role.id});
                      }}>+ Rock</button>
                      <button className="r-del" onClick={()=>{if(confirm(`Delete "${role.name}"?`))rmRole(role.id);}}>×</button>
                    </div>
                  </div>
                  {rr.length===0
                    ?<p className="no-rocks">No rocks yet — what matters most?</p>
                    :rr.map(rock=>(
                      <div key={rock.id} className={`rock-row ${rock.completed?'rdone':''}`}>
                        <button className="rcheck" onClick={()=>updRock(rock.id,{completed:!rock.completed})}>
                          {rock.completed?'✓':''}
                        </button>
                        <div className="rlabel" onClick={()=>setModal({type:'rockDetail',rockId:rock.id})}>
                          <span className="rtxt">{rock.title}</span>
                          <div className="rchips">
                            {rock.dayIdx!==null&&<span className="chip-day">{DAYS_3[rock.dayIdx]}</span>}
                            {rock.startTime&&<span className="chip-time">⏱ {formatTime(rock.startTime)}</span>}
                          </div>
                        </div>
                      </div>
                    ))
                  }
                </div>
              );
            })}

            {weekRocks.length>0&&(
              <button className="copy-btn" onClick={copyFwd}>Copy rocks to next week →</button>
            )}
          </aside>

          {/* ── WEEK SECTION ── */}
          <section className={`week-section ${mobileView==='week'?'mob-show':''}`}>

            {/* Desktop: 7-column grid */}
            <div className="week-grid desktop-grid">
              {weekDates.map((date,i)=>{
                const dr=forDay(i), today=isToday(date);
                return(
                  <div key={i} className={`day-col ${today?'today':''}`}>
                    <div className="day-head-desktop">
                      <span className="dname-d">{DAYS_3[i]}</span>
                      <span className={`dnum-d ${today?'today-circle':''}`}>{date.getDate()}</span>
                    </div>
                    <div className="day-body-d">
                      {dr.map(rock=>{
                        const role=roles.find(r=>r.id===rock.roleId);
                        const pal=PALETTE[role?.pi??0];
                        return(
                          <div key={rock.id}
                            className={`grid-rock ${rock.completed?'rdone':''}`}
                            style={{'--rc-m':pal.mid,'--rc-dm':pal.dmBg,'--rc-dt':pal.dmText}}
                            onClick={()=>setModal({type:'rockDetail',rockId:rock.id})}>
                            <span className="gr-role">{role?.emoji} {role?.name}</span>
                            <span className="gr-title">{rock.title}</span>
                            {rock.startTime&&<span className="gr-time">⏱ {formatTime(rock.startTime)}</span>}
                            {rock.completed&&<span className="gr-chk">✓</span>}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Mobile: vertical agenda rows */}
            <div className="mobile-agenda">
              {weekDates.map((date,i)=>{
                const dr=forDay(i), today=isToday(date);
                return(
                  <div key={i} className={`agenda-row ${today?'agenda-today':''}`}>

                    {/* Left: date badge */}
                    <div className="agenda-date">
                      <span className="agenda-day">{DAYS_2[i]}</span>
                      <span className={`agenda-num ${today?'agenda-today-num':''}`}>{date.getDate()}</span>
                    </div>

                    {/* Divider */}
                    <div className={`agenda-divider ${today?'agenda-divider-today':''}`}/>

                    {/* Right: rocks */}
                    <div className="agenda-rocks">
                      {dr.length===0
                        ? <span className="agenda-empty">—</span>
                        : dr.map(rock=>{
                          const role=roles.find(r=>r.id===rock.roleId);
                          const pal=PALETTE[role?.pi??0];
                          return(
                            <div key={rock.id}
                              className={`agenda-rock ${rock.completed?'rdone':''}`}
                              style={{'--rc-m':pal.mid,'--rc-dm':pal.dmBg,'--rc-dt':pal.dmText}}
                              onClick={()=>setModal({type:'rockDetail',rockId:rock.id})}>
                              <span className="ar-emoji">{role?.emoji}</span>
                              <span className="ar-title">{rock.title}</span>
                              {rock.completed&&<span className="ar-done">✓</span>}
                            </div>
                          );
                        })
                      }
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Unscheduled */}
            {unscheduled.length>0&&(
              <div className="unsched-bar">
                <span className="ul">⏳ Unscheduled</span>
                <div className="uchips">
                  {unscheduled.map(rock=>{
                    const role=roles.find(r=>r.id===rock.roleId);
                    const pal=PALETTE[role?.pi??0];
                    return(
                      <div key={rock.id} className="uchip"
                        style={{background:pal.dmBg,borderColor:pal.mid,color:pal.dmText}}
                        onClick={()=>setModal({type:'rockDetail',rockId:rock.id})}>
                        {role?.emoji} {rock.title}
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {weekRocks.length===0&&(
              <div className="empty-week">
                <span style={{fontSize:'2rem',opacity:0.2}}>🪨</span>
                <p className="et">No rocks this week</p>
                <p className="es">Add priorities in the Roles panel.</p>
              </div>
            )}
          </section>
        </div>

        {/* ── MODALS ── */}
        {modal&&(
          <ModalOverlay onClose={()=>setModal(null)}>
            {modal.type==='addRole'&&<AddRoleModal onAdd={addRole} onClose={()=>setModal(null)}/>}
            {modal.type==='addRock'&&(
              <AddRockModal role={roles.find(r=>r.id===modal.roleId)}
                onAdd={(t,d)=>addRock(modal.roleId,t,d)} onClose={()=>setModal(null)}/>
            )}
            {modal.type==='rockDetail'&&(()=>{
              const rock=rocks.find(r=>r.id===modal.rockId);
              const role=rock?roles.find(r=>r.id===rock.roleId):null;
              if(!rock||!role) return null;
              return(
                <RockDetailModal rock={rock} role={role} weekDates={weekDates}
                  onUpdate={ch=>updRock(rock.id,ch)}
                  onExport={()=>toGcal(rock)}
                  onDelete={()=>{ if(confirm('Delete this rock?')) rmRock(rock.id); }}
                  onClose={()=>setModal(null)}/>
              );
            })()}
          </ModalOverlay>
        )}
      </div>
    </>
  );
}

function ModalOverlay({children,onClose}){
  return(
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-box">{children}</div>
    </div>
  );
}

function AddRoleModal({onAdd,onClose}){
  const [name,setName]=useState('');
  const [emoji,setEmoji]=useState('🎯');
  const [pi,setPi]=useState(4);
  return(
    <div className="mi">
      <button className="mx" onClick={onClose}>✕</button>
      <h2 className="mt">Add a Role</h2>
      <p className="md">A key area of your life — Parent, Creator, Leader, Partner…</p>
      <div className="field">
        <label>Name</label>
        <input className="fi" value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Mentor, Partner, Artist" autoFocus/>
      </div>
      <div className="field">
        <label>Icon</label>
        <div className="egrid">{EMOJIS.map(e=>(
          <button key={e} className={`ebtn ${emoji===e?'sel':''}`} onClick={()=>setEmoji(e)}>{e}</button>
        ))}</div>
      </div>
      <div className="field">
        <label>Color</label>
        <div className="crow">{PALETTE.map((p,i)=>(
          <button key={i} className={`cdot ${pi===i?'sel':''}`} style={{background:p.mid}} onClick={()=>setPi(i)}/>
        ))}</div>
      </div>
      <div className="mactions">
        <button className="btn-cancel" onClick={onClose}>Cancel</button>
        <button className="btn-primary" disabled={!name.trim()} onClick={()=>name.trim()&&onAdd(name.trim(),emoji,pi)}>Add Role</button>
      </div>
    </div>
  );
}

function AddRockModal({role,onAdd,onClose}){
  const [title,setTitle]=useState('');
  const [desc,setDesc]=useState('');
  const pal=PALETTE[role?.pi??0];
  return(
    <div className="mi">
      <button className="mx" onClick={onClose}>✕</button>
      <div className="role-tag" style={{background:pal.dmBg,color:pal.dmText,border:`1px solid ${pal.mid}50`}}>
        {role?.emoji} {role?.name}
      </div>
      <h2 className="mt">Add Big Rock</h2>
      <p className="md">The most important thing you can do in this role this week.</p>
      <div className="field">
        <label>Rock</label>
        <input className="fi" value={title} onChange={e=>setTitle(e.target.value)} placeholder="e.g. Finish the proposal draft" autoFocus/>
      </div>
      <div className="field">
        <label>Notes <span className="opt">(optional)</span></label>
        <textarea className="fi" value={desc} onChange={e=>setDesc(e.target.value)}
          placeholder="Why it matters, context, next steps…" rows={3} style={{resize:'vertical'}}/>
      </div>
      <div className="mactions">
        <button className="btn-cancel" onClick={onClose}>Cancel</button>
        <button className="btn-primary" style={{background:pal.mid}} disabled={!title.trim()}
          onClick={()=>title.trim()&&onAdd(title.trim(),desc.trim())}>Add Rock</button>
      </div>
    </div>
  );
}

function RockDetailModal({rock,role,weekDates,onUpdate,onExport,onDelete,onClose}){
  const pal=PALETTE[role?.pi??0];
  const [st,setSt]    = useState(rock.startTime||'09:00');
  const [dur,setDur]  = useState(rock.duration||60);
  const [timeOn,setTO]= useState(!!rock.startTime);
  const saveTime=(on,s,d)=>onUpdate({startTime:on?s:null,duration:d});
  return(
    <div className="mi">
      <button className="mx" onClick={onClose}>✕</button>
      <div className="role-tag" style={{background:pal.dmBg,color:pal.dmText,border:`1px solid ${pal.mid}50`}}>
        {role?.emoji} {role?.name}
      </div>
      <h2 className="mt" style={{textDecoration:rock.completed?'line-through':'none',opacity:rock.completed?0.45:1}}>
        {rock.title}
      </h2>
      {rock.description&&<p className="rnotes">{rock.description}</p>}

      <div className="field">
        <label>Day</label>
        <div className="dprow">
          <button className={`dp ${rock.dayIdx===null?'dp-on':''}`} onClick={()=>onUpdate({dayIdx:null})}>—</button>
          {weekDates.map((d,i)=>(
            <button key={i} className={`dp ${rock.dayIdx===i?'dp-on':''}`}
              style={rock.dayIdx===i?{background:pal.mid,borderColor:pal.mid,color:'#fff'}:{}}
              onClick={()=>onUpdate({dayIdx:i})}>
              {DAYS_3[i]}<br/><small style={{fontSize:'0.6rem',opacity:0.65}}>{d.getDate()}</small>
            </button>
          ))}
        </div>
      </div>

      {rock.dayIdx!==null&&(
        <div className="field">
          <div className="tb-header">
            <label style={{margin:0}}>Time Block</label>
            <button className={`ttoggle ${timeOn?'ton':''}`} onClick={()=>{
              const ne=!timeOn; setTO(ne); saveTime(ne,st,dur);
            }}>{timeOn?'⏱ Enabled':'+ Add Time'}</button>
          </div>
          {timeOn?(
            <div className="tinputs">
              <div className="tig">
                <span className="tilbl">Start</span>
                <input type="time" className="tinput" value={st}
                  onChange={e=>{setSt(e.target.value);saveTime(true,e.target.value,dur);}}/>
              </div>
              <div className="tig">
                <span className="tilbl">Duration</span>
                <select className="tsel" value={dur}
                  onChange={e=>{const v=Number(e.target.value);setDur(v);saveTime(true,st,v);}}>
                  {DURATIONS.map(d=><option key={d.value} value={d.value}>{d.label}</option>)}
                </select>
              </div>
              {st&&<div className="tpreview">{formatTime(st)} → {formatTime(addMins(st,dur))}</div>}
            </div>
          ):(
            <p className="thint">Add a time to block this in your calendar and get a precise Google Calendar export.</p>
          )}
        </div>
      )}

      <div className="dactions">
        <button className={`da ${rock.completed?'da-undo':'da-done'}`}
          onClick={()=>{onUpdate({completed:!rock.completed});onClose();}}>
          {rock.completed?'↩ Mark Incomplete':'✓ Mark Complete'}
        </button>
        <button className="da da-cal" onClick={onExport}>
          📅 Add to Google Calendar {rock.startTime?`(${formatTime(rock.startTime)})`:'(all-day)'}
        </button>
        <button className="da da-del" onClick={onDelete}>🗑 Delete Rock</button>
      </div>
      <button className="done-btn" onClick={onClose}>Done</button>
    </div>
  );
}
